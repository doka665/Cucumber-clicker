<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Gurķu Bode - Reģistrācija</title>
    <style>
        @import url('https://googleapis.com');
        body { background: #e8f5e9; background-image: radial-gradient(#81c784 10%, transparent 10%); background-size: 30px 30px; font-family: 'Fredoka One', cursive; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border: 8px solid #2e7d32; border-radius: 40px; box-shadow: 10px 10px 0px #1b5e20; width: 350px; text-align: center; }
        h1 { color: #2e7d32; font-size: 2rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 4px solid #a5d6a7; border-radius: 20px; box-sizing: border-box; font-family: inherit; font-size: 1rem; outline: none; }
        .btn { width: 100%; padding: 15px; background: #4caf50; color: white; border: 4px solid #1b5e20; border-radius: 50px; font-size: 1.3rem; cursor: pointer; box-shadow: 0 6px 0 #1b5e20; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1b5e20; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🥒 Reģistrācija</h1>
        <form onsubmit="saveUser(event)">
            <input type="text" id="u" placeholder="Lietotājvārds" required>
            <input type="password" id="p" placeholder="Parole" required>
            <button type="submit" class="btn">SĀKT TIRGOTIES!</button>
        </form>
    </div>
    <script>
        function saveUser(e) {
            e.preventDefault();
            localStorage.setItem('currentUser', document.getElementById('u').value);
            window.location.href = "saite.html";
        }
    </script>
</body>
</html>
